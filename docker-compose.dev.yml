version: "3.9"

services:
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: rpl-backend-app-dev
    command: ["air", "-c", ".air.linux.toml"]
    volumes:
      - .:/app
    ports:
      - "${APP_PORT:-8081}:${APP_PORT:-8080}"
    env_file:
      - .env
    depends_on:
      - db-dev
    networks:
      - rpl-app-dev-net

  db-dev:
    image: postgres:17
    container_name: rpl-backend-db-dev
    env_file:
      - .env
    ports:
      - "5433:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    networks:
      - rpl-app-dev-net

volumes:
  pgdata_dev:

networks:
  rpl-app-dev-net:
    driver: bridge
