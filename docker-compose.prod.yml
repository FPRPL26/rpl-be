version: "3.9"

services:
  app-prod:
    image: rpl-backend-prod:latest
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: rpl-backend-app-prod
    ports:
      - "8080:8080"
    env_file:
      - .env.prod
    volumes:
      - ./assets/uploads:/app/assets/uploads
    depends_on:
      db-prod:
        condition: service_healthy
    networks:
      - backend_net

  db-prod:
    image: postgres:17
    container_name: rpl-backend-db-prod
    env_file:
      - .env.prod
    ports:
      - "5432:5432"
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rpl-db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend_net

volumes:
  pgdata_prod:

networks:
  backend_net:
    driver: bridge
